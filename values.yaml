# ============================================================
# Chat Assistant OpenShift Helm Chart — values.yaml
# ============================================================

# -- NVIDIA API Key (NGC)
nvidiaApiKey: ""

# -- Application API Keys
llmApiKey: ""
embedApiKey: ""
railApiKey: ""

# -- NGC Docker Registry pull secret (for nvcr.io images)
ngcImagePull:
  enabled: true
  registry: nvcr.io
  username: "$oauthtoken"
  password: ""
  email: ""

# -- Naming
nameOverride: "insurance-claim"
fullnameOverride: ""

# -- OpenShift namespace
namespace: ""

# ============================================================
# OpenShift Routes (replaces nginx)
# ============================================================
routes:
  frontend:
    enabled: true
    host: ""
  chainServer:
    enabled: true
    host: ""
  claimsFrontend:
    enabled: true
    host: ""
  adminDashboard:
    enabled: true
    host: ""

# ============================================================
# Application Services
# ============================================================

# 1. Chain Server
chainServer:
  image: lakshmilavanya2001/retail-assistant-chain-server:latest
  replicas: 1
  port: 8009

# 2. Catalog Retriever
catalogRetriever:
  image: lakshmilavanya2001/retail-assistant-catalog-retriever:latest
  replicas: 1
  port: 8010

# 3. Memory Retriever
memoryRetriever:
  image: lakshmilavanya2001/retail-assistant-memory-retriever:latest
  replicas: 1
  port: 8011

# 4. Guardrails (Rails)
rails:
  image: lakshmilavanya2001/retail-assistant-rails:latest
  replicas: 1
  port: 8012

# 5. Frontend (shopping UI)
frontend:
  image: lakshmilavanya2001/retail-assistant-frontend:latest
  replicas: 1
  port: 3000

# 6. Speech Service
speechService:
  image: lakshmilavanya2001/retail-assistant-speech-service:latest
  replicas: 1
  port: 8013

# 7. Text-to-SQL Agent
textToSqlAgent:
  image: lakshmilavanya2001/text-to-sql-agent
  replicas: 1
  port: 8017

# 8. User Management
userManagement:
  image: lakshmilavanya2001/retail-assistant-user-management:latest
  replicas: 1
  port: 8014

# 9. Notification Agent
notificationAgent:
  image: lakshmilavanya2001/notification-agent:latest
  replicas: 1
  port: 8015

# 10. Claim Agent (disabled by default)
claimAgent:
  enabled: false
  image: claim-agent:latest
  replicas: 1
  port: 8016

# ============================================================
# NIM GPU Services
# ============================================================

# 11. Llama 3.1 8B Instruct
llama:
  image: nvcr.io/nim/meta/llama-3.1-8b-instruct
  replicas: 1
  port: 8000
  servicePort: 8000
  shmSize: "16Gi"
  gpu: 1

# 12. NV-EmbedQA E5
embedqa:
  image: nvcr.io/nim/nvidia/nv-embedqa-e5-v5:1.6
  replicas: 1
  port: 8000
  servicePort: 8001
  shmSize: "16Gi"
  gpu: 1
  env:
    NIM_FORCE_RECOMPILE: "1"

# 13. NemoGuard Content Safety
contentSafety:
  image: nvcr.io/nim/nvidia/llama-3.1-nemoguard-8b-content-safety:1.10.1
  replicas: 1
  port: 8000
  servicePort: 8003
  shmSize: "16Gi"
  gpu: 1
  env:
    NIM_KVCACHE_PERCENT: ".4"

# 14. NemoGuard Topic Control
topicControl:
  image: nvcr.io/nim/nvidia/llama-3.1-nemoguard-8b-topic-control:1.0.0
  replicas: 1
  port: 8000
  servicePort: 8004
  shmSize: "16Gi"
  gpu: 1
  env:
    NIM_KVCACHE_PERCENT: ".4"

# 15. NV-CLIP (disabled by default)
nvclip:
  enabled: false
  image: nvcr.io/nim/nvidia/nvclip:2.0.0
  replicas: 1
  port: 8000
  servicePort: 8002
  shmSize: "8Gi"
  gpu: 1

# 16. Riva Speech Services
rivaSpeech:
  image: nvcr.io/nvidia/riva/riva-speech:2.14.0
  replicas: 1
  grpcPort: 50051
  httpPort: 50052
  gpu: 1

# ============================================================
# Infrastructure (StatefulSets)
# ============================================================

# 17. etcd
etcd:
  image: quay.io/coreos/etcd:v3.5.5
  replicas: 1
  pvcSize: 5Gi
  env:
    ETCD_AUTO_COMPACTION_MODE: revision
    ETCD_AUTO_COMPACTION_RETENTION: "1000"
    ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    ETCD_SNAPSHOT_COUNT: "50000"

# 18. MinIO
minio:
  image: minio/minio:RELEASE.2023-03-20T20-16-18Z
  replicas: 1
  apiPort: 9000
  consolePort: 9001
  pvcSize: 20Gi
  accessKey: minioadmin
  secretKey: minioadmin

# 19. Milvus
milvus:
  image: milvusdb/milvus:v2.4.13-hotfix
  replicas: 1
  port: 19530
  metricsPort: 9091
  pvcSize: 20Gi

# 20. PostgreSQL
postgres:
  image: postgres:15
  replicas: 1
  port: 5432
  pvcSize: 10Gi
  database: insurance_db
  user: insurance_user
  password: insurance_password

# 21. MongoDB
mongodb:
  image: mongo:8.2.6
  replicas: 1
  port: 27017
  pvcSize: 10Gi
  database: insurance_users

# ============================================================
# KYC / Claims Frontends
# ============================================================

# 22. Claims Frontend
claimsFrontend:
  image: ribinbaby/insureguard:claims-frontend
  replicas: 1
  port: 80
  servicePort: 3100

# 23. Admin Dashboard
adminDashboard:
  image: ribinbaby/insureguard:claims-backend
  replicas: 1
  port: 80
  servicePort: 3200

# ============================================================
# Shared Volume
# ============================================================
sharedVolume:
  pvcSize: 5Gi
