# =============================================================================
# Chat Assistance – Helm Values
# =============================================================================

# Target OpenShift namespace / project
namespace: chat-assistant

# ---------------------------------------------------------------------------
# NGC / NIM credentials
# Pass at install time:
#   helm install ... --set ngc.apiKey=<YOUR_KEY>
# Or via a private values file:
#   helm install ... -f my-secrets.yaml
# ---------------------------------------------------------------------------
ngc:
  # Required – the chart will fail to render if left empty
  apiKey: ""
  # NGC registry username (leave as default for NIM)
  registryUser: "$oauthtoken"

# ---------------------------------------------------------------------------
# Database credentials
# ---------------------------------------------------------------------------
db:
  postgres:
    database: insurance_db
    user: insurance_user
    password: insurance_password
  mongo:
    database: insurance_users
  minio:
    rootUser: minioadmin
    rootPassword: minioadmin
    accessKey: minioadmin
    secretKey: minioadmin

# ---------------------------------------------------------------------------
# Persistent storage
# storageClassName: "" → use the cluster default StorageClass
# ---------------------------------------------------------------------------
storage:
  storageClassName: ""
  etcd:
    size: 1Gi
  minio:
    size: 5Gi
  milvus:
    size: 5Gi
  postgres:
    size: 5Gi
  mongo:
    size: 5Gi
  memoryRetriever:
    size: 1Gi
  nimCache:
    llama: 30Gi
    content: 30Gi
    topicControl: 30Gi

# ---------------------------------------------------------------------------
# Container images
# ---------------------------------------------------------------------------
images:
  # Infrastructure
  etcd: lakshmilavanya2001/insurance-chat-assistant:etcd
  minio: lakshmilavanya2001/insurance-chat-assistant:minio
  milvus: lakshmilavanya2001/insurance-chat-assistant:milvus
  postgres: lakshmilavanya2001/insurance-chat-assistant:postgres
  mongodb: lakshmilavanya2001/insurance-chat-assistant:mongo
  # Backend services
  chainServer: lakshmilavanya2001/insurance-chat-assistant:chain-server
  catalogRetriever: lakshmilavanya2001/insurance-chat-assistant:catalog-retriever
  memoryRetriever: lakshmilavanya2001/insurance-chat-assistant:memory-retriever
  rails: lakshmilavanya2001/insurance-chat-assistant:rails
  textToSqlAgent: lakshmilavanya2001/insurance-chat-assistant:text-to-sql-agent
  userManagement: lakshmilavanya2001/insurance-chat-assistant:user-management
  notificationAgent: lakshmilavanya2001/insurance-chat-assistant:notification-agent
  # NVIDIA / NIM (pulled from nvcr.io – unchanged)
  llama: "nvcr.io/nim/meta/llama-3.1-8b-instruct:1.2.2"
  embedqa: "nvcr.io/nim/nvidia/nv-embedqa-e5-v5:1.6"
  content: "nvcr.io/nim/nvidia/llama-3.1-nemoguard-8b-content-safety:1.10.1"
  topicControl: "nvcr.io/nim/nvidia/llama-3.1-nemoguard-8b-topic-control:1.0.0"
  # Frontend
  frontend: lakshmilavanya2001/insurance-chat-assistant:frontend

# Default replica count for all deployments
replicaCount: 1

# ---------------------------------------------------------------------------
# NVIDIA feature flag
# Set nvidia.enabled: false to skip all GPU workloads (riva, llama, embedqa, etc.)
# ---------------------------------------------------------------------------
nvidia:
  enabled: true
  gpuCount: 1

# ---------------------------------------------------------------------------
# OpenShift Routes (HAProxy path-based – one Route per service)
# Leave host blank for OpenShift to auto-assign a hostname.
# All routes will share the same auto-assigned hostname.
# ---------------------------------------------------------------------------
route:
  host: ""
  tls:
    enabled: true        # Edge-terminated TLS (recommended)
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# ---------------------------------------------------------------------------
# Resource requests & limits
# ---------------------------------------------------------------------------
resources:
  infra:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  backend:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 2Gi
  nvidia:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 16Gi
  frontend:
    requests:
      cpu: 256m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 2Gi

# ---------------------------------------------------------------------------
# Shared service config files
# These are mounted inside containers at /app/shared/configs/<service>/
# IMPORTANT: Replace the placeholder values below with your actual config content.
# ---------------------------------------------------------------------------
sharedConfigs:
  # Mounted at: /app/shared/configs/catalog_retriever/config.yaml
  catalogRetriever: |
    milvus_host: milvus
    milvus_port: "19530"
    text_embed_host: embedqa
    text_embed_port: "8000"
    image_embed_host: embedqa
    image_embed_port: "8000"
    text_model_name: nvidia/nv-embedqa-e5-v5
    image_model_name: nvidia/nv-embedqa-e5-v5
    db_port: "tcp://milvus:19530"
    db_name: insurance_db
    db_user: insurance_user
    db_password: insurance_password
    pg_host: insurance-postgres
    pg_port: "5432"
    pg_name: insurance_db
    pg_user: insurance_user
    pg_password: insurance_password
    llm_host: llama
    llm_port: "8000"
    llm_model_name: meta/llama-3.1-8b-instruct
    sim_threshold: 0.5
    top_k: 4
    chunk_size: 510
    chunk_overlap: 200
    text_collection: catalog_text_collection
    image_collection: catalog_image_collection
    mongo_host: insurance-mongodb
    mongo_port: "27017"
    mongo_db: insurance_users

  chainServer: |
    llm_port: "http://llama:8000"
    llm_name: meta/llama-3.1-8b-instruct
    retriever_port: "http://catalog-retriever:8010"
    memory_port: "http://memory-retriever:8011"
    rails_port: "http://rails:8012"
    memory_length: 10
    top_k_retrieve: 4
    multimodal: true
    unsafe_message: "I'm sorry, but I'm unable to assist with that request as it may violate our content policy."
    routing_prompt: "You are a routing assistant for an insurance company. Based on the user's query, determine which agent should handle it. Available agents: catalog (product/policy information), memory (conversation history), general (general inquiries)."
    chatter_prompt: "You are a helpful insurance assistant. Answer the user's question clearly and concisely based on the provided context."
    categories:
      - catalog
      - memory
      - general
    agent_choices:
      - catalog
      - memory
      - general

  rails:
    # Mounted at: /app/shared/configs/rails/config.yml
    # Replace with actual NemoGuardrails config.yml content
    configYml: |
      # TODO: paste your NemoGuardrails config.yml content here
      models:
        - type: main
          engine: nim
          model: meta/llama-3.1-8b-instruct
