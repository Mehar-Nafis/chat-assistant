{{- if .Values.nvidiaApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chatassistant.nvidiaSecretName" . }}
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
type: Opaque
stringData:
  NGC_API_KEY: {{ .Values.nvidiaApiKey | quote }}
  NVIDIA_API_KEY: {{ .Values.nvidiaApiKey | quote }}
{{- end }}
