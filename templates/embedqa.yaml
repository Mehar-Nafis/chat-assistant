# NV-EmbedQA E5 NIM — Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatassistant.fullname" . }}-embedqa
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
    app.kubernetes.io/name: embedqa
spec:
  replicas: {{ .Values.embedqa.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: embedqa
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: embedqa
        app.kubernetes.io/instance: {{ .Release.Name }}
        insurance-claim/gpu-workload: "true"
    spec:
      {{- include "chatassistant.gpuTopologySpread" . | nindent 6 }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: llama
                  app.kubernetes.io/instance: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      securityContext:
        {{- include "chatassistant.securityContext" . | nindent 8 }}
      imagePullSecrets:
        - name: {{ include "chatassistant.imagePullSecretName" . }}
      containers:
        - name: embedqa
          image: {{ .Values.embedqa.image }}
          securityContext:
            {{- include "chatassistant.containerSecurityContext" . | nindent 12 }}
          env:
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "chatassistant.nvidiaSecretName" . }}
                  key: NGC_API_KEY
            {{- range $key, $val := .Values.embedqa.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.embedqa.port }}
              name: http
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
            - name: dshm
              mountPath: /dev/shm
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.embedqa.gpu | quote }}
      volumes:
        - name: nim-cache
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.embedqa.shmSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatassistant.fullname" . }}-embedqa
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.embedqa.servicePort }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: embedqa
    app.kubernetes.io/instance: {{ .Release.Name }}
