# Service Config Files — ConfigMap
# Provides the base config.yaml files that catalog-retriever, memory-retriever,
# and rails containers expect at /app/shared/configs/<service>/config.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chatassistant.fullname" . }}-service-configs
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
data:
  catalog_retriever_config.yaml: |
    # Catalog Retriever — base configuration
    # Embedding service (flat keys matching data["key"] access in main.py)
    text_embed_host: "{{ include "chatassistant.fullname" . }}-embedqa"
    text_embed_port: "{{ .Values.embedqa.servicePort }}"
    text_embed_model: "nvidia/nv-embedqa-e5-v5"
    text_model_name: "nvidia/nv-embedqa-e5-v5"

    image_embed_host: "{{ include "chatassistant.fullname" . }}-nvclip"
    image_embed_port: "{{ .Values.nvclip.servicePort }}"
    image_embed_model: "nvidia/nvclip"
    image_model_name: "nvidia/nvclip"

    # Database connectivity
    # Milvus connection disguised as db_*
    db_host: "{{ include "chatassistant.fullname" . }}-milvus"
    db_port: "http://{{ include "chatassistant.fullname" . }}-milvus:{{ .Values.milvus.port }}"
    db_user: {{ .Values.postgres.user }}
    db_password: {{ .Values.postgres.password }}
    db_name: {{ .Values.postgres.database }}

    # Milvus vector DB
    milvus_host: "{{ include "chatassistant.fullname" . }}-milvus"
    milvus_port: {{ .Values.milvus.port }}
    collection_name: "product_catalog"
    text_collection: "product_catalog"
    image_collection: "product_catalog"
    vector_dim: 1024

    # Retrieval settings
    top_k: 5
    score_threshold: 0.0
    sim_threshold: 0.0

    # Server
    server_host: "0.0.0.0"
    server_port: {{ .Values.catalogRetriever.port }}

    log_level: "INFO"

  memory_retriever_config.yaml: |
    # Memory Retriever — base configuration
    # Embedding service (flat keys matching data["key"] access in main.py)
    text_embed_host: "{{ include "chatassistant.fullname" . }}-embedqa"
    text_embed_port: "{{ .Values.embedqa.servicePort }}"
    text_embed_model: "nvidia/nv-embedqa-e5-v5"
    text_model_name: "nvidia/nv-embedqa-e5-v5"

    image_embed_host: "{{ include "chatassistant.fullname" . }}-nvclip"
    image_embed_port: {{ .Values.nvclip.servicePort }}
    image_embed_model: "nvidia/nvclip"
    image_model_name: "nvidia/nvclip"

    # Milvus connection disguised as db_*
    db_host: "{{ include "chatassistant.fullname" . }}-milvus"
    db_port: "http://{{ include "chatassistant.fullname" . }}-milvus:{{ .Values.milvus.port }}"

    # Milvus vector DB
    milvus_host: "{{ include "chatassistant.fullname" . }}-milvus"
    milvus_port: {{ .Values.milvus.port }}
    collection_name: "conversation_memory"
    text_collection: "conversation_memory"
    image_collection: "conversation_memory"
    
    db_path: "/app/shared/memory_retriever/memory.db"
    sqlite_path: "/app/shared/memory_retriever/memory.db"
    db_url: "sqlite:////app/shared/memory_retriever/memory.db"
    database_url: "sqlite:////app/shared/memory_retriever/memory.db"
    vector_dim: 1024

    # Retrieval settings
    top_k: 3
    score_threshold: 0.0
    sim_threshold: 0.0

    # Server
    server_host: "0.0.0.0"
    server_port: {{ .Values.memoryRetriever.port }}

    log_level: "INFO"

  rails_config.yaml: |
    # Guardrails (Rails) — base configuration
    # LLM service (flat keys)
    llm_host: "{{ include "chatassistant.fullname" . }}-llama"
    llm_port: {{ .Values.llama.servicePort }}
    llm_model: "meta/llama-3.1-8b-instruct"

    # Guardrails engine
    engine: "nim"
    temperature: 0.2
    max_tokens: 1024

    # Server
    server_host: "0.0.0.0"
    server_port: {{ .Values.rails.port }}

    log_level: "INFO"
