# Guardrails (Rails) — Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatassistant.fullname" . }}-rails
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
    app.kubernetes.io/name: rails
spec:
  replicas: {{ .Values.rails.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rails
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rails
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- include "chatassistant.dockerHubImagePullSecrets" . | nindent 6 }}
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: frontend
                  app.kubernetes.io/instance: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      securityContext:
        {{- include "chatassistant.securityContext" . | nindent 8 }}
      containers:
        - name: rails
          image: {{ .Values.rails.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "chatassistant.appSecretName" . }}
                  key: RAIL_API_KEY
          ports:
            - containerPort: {{ .Values.rails.port }}
              name: http
          volumeMounts:
            - name: shared-data
              mountPath: /app/shared
            - name: service-configs
              mountPath: /app/shared/configs/rails/config.yaml
              subPath: rails_config.yaml
              readOnly: true
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ include "chatassistant.fullname" . }}-shared
        - name: service-configs
          configMap:
            name: {{ include "chatassistant.fullname" . }}-service-configs

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatassistant.fullname" . }}-rails
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.rails.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: rails
    app.kubernetes.io/instance: {{ .Release.Name }}
