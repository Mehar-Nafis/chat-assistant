---
# memory-retriever – PVC for SQLite database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memory-retriever-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.storage.storageClassName }}
  storageClassName: {{ .Values.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.memoryRetriever.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-retriever
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: memory-retriever
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: memory-retriever
  template:
    metadata:
      labels:
        app: memory-retriever
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:


      containers:
        - name: memory-retriever
          image: {{ .Values.images.memoryRetriever }}
          ports:
            - containerPort: 8011
          env:
            - name: MILVUS_HOST
              value: "milvus"
            - name: MILVUS_PORT
              value: "19530"
            - name: DATABASE_URL
              value: "sqlite:////app/shared/memory.db"
          resources:
            {{- include "chat-assistance.resources.backend" . | nindent 12 }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 8011
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8011
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: sqlite-db
              mountPath: /app/shared
      volumes:
        - name: sqlite-db
          persistentVolumeClaim:
            claimName: memory-retriever-db
---
apiVersion: v1
kind: Service
metadata:
  name: memory-retriever
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - port: 8011
      targetPort: 8011
  selector:
    app: memory-retriever
