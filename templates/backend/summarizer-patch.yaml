---
# Patch for summarizer.py to fix NoneType error when LLM doesn't use the tool_calls.
# Original code: tool_json = json.loads(response.choices[0].message.tool_calls[0].function.arguments)
# Crashes when tool_calls is None (LLM chose not to use the tool).
apiVersion: v1
kind: ConfigMap
metadata:
  name: summarizer-patch
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
data:
  summarizer.py: |
    # SPDX-FileCopyrightText: Copyright (c) 2025 NVIDIA CORPORATION & AFFILIATES. All rights reserved.
    # SPDX-License-Identifier: Apache-2.0

    from openai import OpenAI
    from .agenttypes import State
    from .functions import summary_function
    import requests
    import json
    import os
    import logging
    import sys
    import time


    def setup_logging():
        logging.basicConfig(
            level=logging.INFO,
            format='%(asctime)s - %(levelname)s - %(message)s',
            stream=sys.stdout
        )

    # Configuration will be loaded by the main application

    class SummaryAgent:
        def __init__(self, config):
            logging.info(f"SummaryAgent.__init__() | Initializing with llm_name={config.llm_name}, llm_port={config.llm_port}")
            self.llm_name = config.llm_name
            self.llm_port = config.llm_port
            self.memory_length = config.memory_length
            self.memory_port = config.memory_port
            self.model = OpenAI(base_url=config.llm_port, api_key=os.environ["LLM_API_KEY"])
            logging.info(f"SummaryAgent.__init__() | Initialization complete")

        def invoke(self, state: State, verbose: bool = True) -> State:
            logging.info(f"SummaryAgent.invoke() | Starting with query: {state.query}\n\t Context: {state.context}")
            output_state = state

            messages = [
                {"role": "system", "content": """You are a conversation summarizer for an insurance assistant.

                    CRITICAL RULES:
                    1. REMOVE ALL DUPLICATE content. If the same policy details appear multiple times, keep only ONE copy.
                    2. Preserve key policy information in a concise format:
                       - Policy holder name, user ID, policy number
                       - Policy type and period
                       - Sum insured amounts
                       - Key coverage details (as bullet points, not full paragraphs)
                    3. Preserve the most recent question and answer exchange.
                    4. Remove raw document chunks — keep only the extracted facts.
                    5. Condense aggressively:
                       - Remove greetings and conversational filler
                       - Remove repeated policy text blocks
                       - Summarize coverage details into short bullet points
                    6. The output should be significantly shorter than the input while retaining all unique facts.

                    The goal is to keep the context small and deduplicated while preserving essential policy facts and recent conversation."""},
                {"role": "user", "content": f"CONTEXT TO SUMMARIZE:\n{state.context}"}
            ]

            start = time.monotonic()
            if len(state.context) > self.memory_length:
                logging.info(f"SummaryAgent.invoke() | Context length is greater than memory length")
                response = self.model.chat.completions.create(
                    model=self.llm_name,
                    messages=messages,
                    tools=[summary_function],
                    tool_choice="auto",
                    stream=False,
                    temperature=0.0,
                    max_tokens=self.memory_length
                )

                # Guard against LLM not using the tool (tool_calls may be None)
                tool_calls = response.choices[0].message.tool_calls
                if tool_calls:
                    tool_json = json.loads(tool_calls[0].function.arguments)
                    output_state.context = tool_json.get("summary", output_state.context)
                else:
                    # LLM returned a direct message instead of tool call — use it as summary
                    direct_content = response.choices[0].message.content
                    if direct_content:
                        output_state.context = direct_content
                logging.info(f"SummaryAgent.invoke() | Returning final state with response: {output_state.context}")
            else:
                logging.info(f"SummaryAgent.invoke() | Context length is less than memory length -- writing to memory.")

            # Include policy_user_id in context if available
            context_to_save = output_state.context
            if hasattr(output_state, 'policy_user_id') and output_state.policy_user_id:
                if f"USER_ID: {output_state.policy_user_id}" not in context_to_save:
                    context_to_save = f"USER_ID: {output_state.policy_user_id}\n{context_to_save}"

            requests.post(f"{self.memory_port}/user/{output_state.user_id}/context/replace", json={"new_context": context_to_save})

            end = time.monotonic()
            logging.info(f"SummaryAgent.invoke() | Completed summarization in {end - start} seconds.")
            return output_state
