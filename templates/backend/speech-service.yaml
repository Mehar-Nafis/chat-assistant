---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speech-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: speech-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: speech-service
  template:
    metadata:
      labels:
        app: speech-service
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:
      containers:
        - name: speech-service
          image: {{ .Values.images.speechService }}
          ports:
            - containerPort: 8013
          env:
            - name: RIVA_URI
              value: "riva-speech:50051"
          resources:
            {{- include "chat-assistance.resources.backend" . | nindent 12 }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 8013
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8013
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: speech-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - port: 8013
      targetPort: 8013
  selector:
    app: speech-service
