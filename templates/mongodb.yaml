# MongoDB — StatefulSet + headless Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatassistant.fullname" . }}-mongodb
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.mongodb.port }}
      targetPort: mongo
      name: mongo
  selector:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "chatassistant.fullname" . }}-mongodb
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
    app.kubernetes.io/name: mongodb
spec:
  serviceName: {{ include "chatassistant.fullname" . }}-mongodb
  replicas: {{ .Values.mongodb.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- include "chatassistant.securityContext" . | nindent 8 }}
      containers:
        - name: mongodb
          image: {{ .Values.mongodb.image }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ "ALL" ]
          env:
            - name: MONGO_INITDB_DATABASE
              value: {{ .Values.mongodb.database | quote }}
          ports:
            - containerPort: {{ .Values.mongodb.port }}
              name: mongo
          volumeMounts:
            - name: data
              mountPath: /data/db
          livenessProbe:
            exec:
              command: [ "mongosh", "--eval", "db.adminCommand('ping')", "--quiet" ]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: [ "mongosh", "--eval", "db.adminCommand('ping')", "--quiet" ]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ ReadWriteOnce ]
        resources:
          requests:
            storage: {{ .Values.mongodb.pvcSize }}
