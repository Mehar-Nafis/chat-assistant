# NemoGuard Content Safety NIM — Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatassistant.fullname" . }}-content-safety
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
    app.kubernetes.io/name: content-safety
spec:
  replicas: {{ .Values.contentSafety.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: content-safety
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: content-safety
        app.kubernetes.io/instance: {{ .Release.Name }}
        insurance-claim/gpu-workload: "true"
    spec:
      {{- include "chatassistant.gpuTopologySpread" . | nindent 6 }}
      securityContext:
        {{- include "chatassistant.securityContext" . | nindent 8 }}
      imagePullSecrets:
        - name: {{ include "chatassistant.imagePullSecretName" . }}
      containers:
        - name: content-safety
          image: {{ .Values.contentSafety.image }}
          securityContext:
            {{- include "chatassistant.containerSecurityContext" . | nindent 12 }}
          env:
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "chatassistant.nvidiaSecretName" . }}
                  key: NGC_API_KEY
            {{- range $key, $val := .Values.contentSafety.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.contentSafety.port }}
              name: http
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
            - name: dshm
              mountPath: /dev/shm
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.contentSafety.gpu | quote }}
      volumes:
        - name: nim-cache
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.contentSafety.shmSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatassistant.fullname" . }}-content-safety
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.contentSafety.servicePort }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: content-safety
    app.kubernetes.io/instance: {{ .Release.Name }}
