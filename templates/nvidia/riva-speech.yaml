{{- if .Values.nvidia.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: riva-speech
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: riva-speech
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: riva-speech
  template:
    metadata:
      labels:
        app: riva-speech
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:
      containers:
        - name: riva-speech
          image: {{ .Values.images.rivaSpeech }}
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 50052
              name: http
          env:
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-secret
                  key: api-key
          resources:
            {{- include "chat-assistance.resources.nvidia" . | nindent 12 }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 60
            periodSeconds: 20
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: riva-speech
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
    - port: 50052
      targetPort: 50052
      name: http
  selector:
    app: riva-speech
{{- end }}
