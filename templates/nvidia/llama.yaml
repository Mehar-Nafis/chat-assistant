{{- if .Values.nvidia.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: llama
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llama
  template:
    metadata:
      labels:
        app: llama
        gpu-workload: "true"
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:
      {{- include "chat-assistance.nodeSelector" . | nindent 6 }}

      imagePullSecrets:
        - name: ncr-registry-secret
      containers:
        - name: llama
          image: {{ .Values.images.llama }}
          ports:
            - containerPort: 8000
          env:
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-secret
                  key: api-key
            # NIM_MODEL_PROFILE intentionally removed — let NIM auto-select the optimal
            # profile for this GPU (L40S). Forcing vllm-bf16-tp1 enables chunked prefill
            # which causes 2s-per-token latency. Auto-select matches docker-compose behavior.
            - name: NIM_MAX_NUM_SEQS
              value: {{ .Values.nvidia.maxNumSeqs | default "2" | quote }}
            # NIM_KVCACHE_PERCENT removed — vLLM-specific; crashes TRT-LLM auto-selected profiles
            # NIM/vLLM defaults to 90% KV cache on dedicated GPU which is optimal for L40S
            # Remove vLLM scheduler delay so tokens are dispatched without artificial pause
            - name: VLLM_SLEEP_WHEN_IDLE
              value: "0"
            # Stream in small token chunks (5) for smooth UI render instead of word-by-word single tokens
            # Adjust in values.yaml via nvidia.streamingTokenChunkSize
            - name: NIM_STREAMING_TOKEN_CHUNK_SIZE
              value: {{ .Values.nvidia.streamingTokenChunkSize | default "20" | quote }}
            # Enable prompt streaming so first tokens reach client immediately
            - name: NIM_ENABLE_PROMPT_STREAMING
              value: {{ .Values.nvidia.enablePromptStreaming | default "1" | quote }}
          resources:
            requests:
              cpu: {{ .Values.resources.nvidia.requests.cpu }}
              memory: {{ .Values.resources.nvidia.requests.memory }}
            limits:
              cpu: {{ .Values.resources.nvidia.limits.cpu }}
              memory: {{ .Values.resources.nvidia.limits.memory }}
              nvidia.com/gpu: {{ .Values.nvidia.llamaGpuCount | default .Values.nvidia.gpuCount }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 30
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
      volumes:
        - name: nim-cache
          persistentVolumeClaim:
            claimName: nim-cache-llama
---
apiVersion: v1
kind: Service
metadata:
  name: llama
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: llama
{{- end }}
