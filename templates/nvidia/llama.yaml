{{- if .Values.nvidia.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: llama
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: llama
  template:
    metadata:
      labels:
        app: llama
        gpu-workload: "true"
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:
      {{- include "chat-assistance.gpuSpread" . | nindent 6 }}
      imagePullSecrets:
        - name: ncr-registry-secret
      containers:
        - name: llama
          image: {{ .Values.images.llama }}
          ports:
            - containerPort: 8000
          env:
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-secret
                  key: api-key
          resources:
            requests:
              cpu: {{ .Values.resources.nvidia.requests.cpu }}
              memory: {{ .Values.resources.nvidia.requests.memory }}
            limits:
              cpu: {{ .Values.resources.nvidia.limits.cpu }}
              memory: {{ .Values.resources.nvidia.limits.memory }}
              nvidia.com/gpu: {{ .Values.nvidia.llamaGpuCount | default .Values.nvidia.gpuCount }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 30
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
      volumes:
        - name: nim-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: llama
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: llama
{{- end }}
