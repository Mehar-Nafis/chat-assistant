{{- if .Values.ngcImagePull.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chatassistant.imagePullSecretName" . }}
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{"%s":{"username":"%s","password":"%s","email":"%s","auth":"%s"}}}` .Values.ngcImagePull.registry .Values.ngcImagePull.username (default .Values.nvidiaApiKey .Values.ngcImagePull.password) (default "none@example.com" .Values.ngcImagePull.email) (printf "%s:%s" .Values.ngcImagePull.username (default .Values.nvidiaApiKey .Values.ngcImagePull.password) | b64enc) | b64enc }}
{{- end }}
{{- if .Values.dockerHubImagePull.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chatassistant.dockerHubPullSecretName" . }}
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{"%s":{"username":"%s","password":"%s","email":"%s","auth":"%s"}}}` .Values.dockerHubImagePull.registry .Values.dockerHubImagePull.username .Values.dockerHubImagePull.password (default "none@example.com" .Values.dockerHubImagePull.email) (printf "%s:%s" .Values.dockerHubImagePull.username .Values.dockerHubImagePull.password | b64enc) | b64enc }}
{{- end }}
