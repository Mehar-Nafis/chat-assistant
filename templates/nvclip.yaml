# NV-CLIP NIM — Deployment + Service (disabled by default)
{{- if .Values.nvclip.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatassistant.fullname" . }}-nvclip
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
    app.kubernetes.io/name: nvclip
spec:
  replicas: {{ .Values.nvclip.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nvclip
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvclip
        app.kubernetes.io/instance: {{ .Release.Name }}
        insurance-claim/gpu-workload: "true"
    spec:
      {{- include "chatassistant.gpuTopologySpread" . | nindent 6 }}
      securityContext:
        {{- include "chatassistant.securityContext" . | nindent 8 }}
      imagePullSecrets:
        - name: {{ include "chatassistant.imagePullSecretName" . }}
      containers:
        - name: nvclip
          image: {{ .Values.nvclip.image }}
          securityContext:
            {{- include "chatassistant.containerSecurityContext" . | nindent 12 }}
          env:
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "chatassistant.nvidiaSecretName" . }}
                  key: NGC_API_KEY
          ports:
            - containerPort: {{ .Values.nvclip.port }}
              name: http
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
            - name: dshm
              mountPath: /dev/shm
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.nvclip.gpu | quote }}
      volumes:
        - name: nim-cache
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.nvclip.shmSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatassistant.fullname" . }}-nvclip
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.nvclip.servicePort }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: nvclip
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
