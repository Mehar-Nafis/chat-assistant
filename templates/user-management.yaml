# User Management — Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatassistant.fullname" . }}-user-management
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
    app.kubernetes.io/name: user-management
spec:
  replicas: {{ .Values.userManagement.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: user-management
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-management
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: frontend
                  app.kubernetes.io/instance: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      securityContext:
        {{- include "chatassistant.securityContext" . | nindent 8 }}
      containers:
        - name: user-management
          image: {{ .Values.userManagement.image }}
          securityContext:
            {{- include "chatassistant.containerSecurityContext" . | nindent 12 }}
          ports:
            - containerPort: {{ .Values.userManagement.port }}
              name: http
          volumeMounts:
            - name: shared
              mountPath: /app/shared
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: {{ include "chatassistant.fullname" . }}-shared
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatassistant.fullname" . }}-user-management
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.userManagement.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: user-management
    app.kubernetes.io/instance: {{ .Release.Name }}
