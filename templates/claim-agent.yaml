# Claim Agent — Deployment + Service (disabled by default)
{{- if .Values.claimAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatassistant.fullname" . }}-claim-agent
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
    app.kubernetes.io/name: claim-agent
spec:
  replicas: {{ .Values.claimAgent.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: claim-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claim-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- include "chatassistant.securityContext" . | nindent 8 }}
      containers:
        - name: claim-agent
          image: {{ .Values.claimAgent.image }}
          securityContext:
            {{- include "chatassistant.containerSecurityContext" . | nindent 12 }}
          ports:
            - containerPort: {{ .Values.claimAgent.port }}
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatassistant.fullname" . }}-claim-agent
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.claimAgent.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: claim-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
