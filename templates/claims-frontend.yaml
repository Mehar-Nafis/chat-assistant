# Claims Frontend — Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatassistant.fullname" . }}-claims-frontend
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
    app.kubernetes.io/name: claims-frontend
spec:
  replicas: {{ .Values.claimsFrontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: claims-frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claims-frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsUser: 0
      containers:
        - name: claims-frontend
          image: {{ .Values.claimsFrontend.image }}
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          ports:
            - containerPort: {{ .Values.claimsFrontend.port }}
              name: http
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "chatassistant.fullname" . }}-nginx-frontend
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatassistant.fullname" . }}-claims-frontend
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.claimsFrontend.servicePort }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: claims-frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
