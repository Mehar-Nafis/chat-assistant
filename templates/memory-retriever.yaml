# Memory Retriever — Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatassistant.fullname" . }}-memory-retriever
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
    app.kubernetes.io/name: memory-retriever
spec:
  replicas: {{ .Values.memoryRetriever.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: memory-retriever
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memory-retriever
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- include "chatassistant.dockerHubImagePullSecrets" . | nindent 6 }}
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: frontend
                  app.kubernetes.io/instance: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      securityContext:
        {{- include "chatassistant.securityContext" . | nindent 8 }}
      # Init container: create required directories on the shared PVC
      # The app tries to create a SQLite DB file inside /app/shared/memory_retriever/
      # and the PVC starts empty, so the directory must be pre-created.
      initContainers:
        - name: init-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /app/shared/memory_retriever
              mkdir -p /app/shared/catalog_retriever
              mkdir -p /app/shared/rails
              mkdir -p /app/shared/data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: shared-data
              mountPath: /app/shared
      containers:
        - name: memory-retriever
          image: {{ .Values.memoryRetriever.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: MILVUS_HOST
              value: "{{ include "chatassistant.fullname" . }}-milvus"
            - name: MILVUS_PORT
              value: {{ .Values.milvus.port | quote }}
          ports:
            - containerPort: {{ .Values.memoryRetriever.port }}
              name: http
          volumeMounts:
            - name: sqlite-data
              mountPath: /app/shared/memory_retriever
            - name: shared-data
              mountPath: /app/shared
            - name: service-configs
              mountPath: /app/shared/configs/memory_retriever/config.yaml
              subPath: memory_retriever_config.yaml
              readOnly: true
      volumes:
        - name: sqlite-data
          emptyDir: {}
        - name: shared-data
          emptyDir: {}
        - name: service-configs
          configMap:
            name: {{ include "chatassistant.fullname" . }}-service-configs

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatassistant.fullname" . }}-memory-retriever
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.memoryRetriever.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: memory-retriever
    app.kubernetes.io/instance: {{ .Release.Name }}
