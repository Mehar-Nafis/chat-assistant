# Memory Retriever — Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatassistant.fullname" . }}-memory-retriever
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
    app.kubernetes.io/name: memory-retriever
spec:
  replicas: {{ .Values.memoryRetriever.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: memory-retriever
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memory-retriever
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- include "chatassistant.dockerHubImagePullSecrets" . | nindent 6 }}
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: frontend
                  app.kubernetes.io/instance: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      securityContext:
        {{- include "chatassistant.securityContext" . | nindent 8 }}
      containers:
        - name: memory-retriever
          image: {{ .Values.memoryRetriever.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "chatassistant.containerSecurityContext" . | nindent 12 }}
          env:
            - name: MILVUS_HOST
              value: "{{ include "chatassistant.fullname" . }}-milvus"
            - name: MILVUS_PORT
              value: {{ .Values.milvus.port | quote }}
          ports:
            - containerPort: {{ .Values.memoryRetriever.port }}
              name: http
          volumeMounts:
            - name: shared-data
              mountPath: /app/shared
            - name: service-configs
              mountPath: /app/shared/configs/memory_retriever/config.yaml
              subPath: memory_retriever_config.yaml
              readOnly: true
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ include "chatassistant.fullname" . }}-shared
        - name: service-configs
          configMap:
            name: {{ include "chatassistant.fullname" . }}-service-configs

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatassistant.fullname" . }}-memory-retriever
  labels:
    {{- include "chatassistant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.memoryRetriever.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: memory-retriever
    app.kubernetes.io/instance: {{ .Release.Name }}
